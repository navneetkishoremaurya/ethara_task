# Netlify-style: no Docker. Connect repo → Blueprint, set DATABASE_URL (Neon).
services:
  - type: web
    name: nexus-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: sh scripts/start.sh
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
