# From backend/: fly launch --no-deploy
# Then: fly postgres create && fly postgres attach <cluster-name>
# Or:  fly secrets set DATABASE_URL='postgresql://...' CORS_ORIGINS='https://your-app.netlify.app'

# Don't hardcode an app name here; set it via `flyctl launch --name ...`
# so you can pick a unique name per account.
primary_region = 'bom'

[build]
  dockerfile = 'scripts/Dockerfile'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = '15s'
    interval = '30s'
    method = 'GET'
    path = '/health'
    timeout = '5s'

[env]
  PORT = '8000'
